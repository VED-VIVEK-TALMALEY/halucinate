<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HalluciNet — AI Hallucination Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:          #050505;
    --surface:     #121212;
    --surface2:    #1e1e1e;
    --border:      #333333;
    --gold:        #ffcc00;
    --gold-light:  #ffff33;
    --gold-dim:    #886600;
    --red:         #ff4444;
    --green:       #44ff88;
    --amber:       #ffaa00;
    --text:        #ffffff;
    --text-muted:  #bbbbbb;
    --text-sub:    #888888;
    --radius:      16px;
    --radius-lg:   24px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 18px; min-height: 100vh; overflow-x: hidden; }
  
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 24px 64px; background: rgba(5,5,5,0.9); backdrop-filter: blur(30px); border-bottom: 2px solid var(--border); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: var(--gold); letter-spacing: -1px; }

  section { position: relative; z-index: 1; padding: 120px 64px; max-width: 1400px; margin: 0 auto; }
  .section-eyebrow { font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 900; color: var(--text); margin-bottom: 32px; line-height: 1.1; }

  .detector-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 64px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .detector-input-area { padding: 48px; }
  .detector-textarea { width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 18px; resize: vertical; min-height: 120px; margin-bottom: 24px; outline: none; transition: border-color 0.3s; }
  .detector-textarea:focus { border-color: var(--gold); }
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  label { display: block; font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

  .api-config { background: var(--surface2); border: 2px solid var(--gold-dim); padding: 32px; border-radius: var(--radius); margin-bottom: 40px; }
  .api-input { width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 16px; color: var(--gold); font-family: 'DM Mono', monospace; font-size: 16px; outline: none; margin-top: 12px; }

  .btn-primary { background: var(--gold); color: #000; border: none; padding: 20px 48px; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 20px; cursor: pointer; transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3); }

  .report-display { font-family: 'DM Mono', monospace; font-size: 16px; line-height: 1.8; color: #eee; white-space: pre-wrap; background: var(--bg); padding: 40px; border-radius: var(--radius); border: 2px solid var(--border); margin: 48px; display: none; }
  
  .confidence-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin: 48px; display: none; }
  .confidence-card { background: var(--surface2); border: 2px solid var(--border); padding: 32px; border-radius: var(--radius); text-align: center; transition: transform 0.3s; }
  .confidence-card:hover { transform: scale(1.05); border-color: var(--gold-dim); }
  .confidence-card h4 { font-size: 14px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; letter-spacing: 2px; }
  .confidence-card .score { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 700; color: var(--gold); }
  .confidence-card.global { border: 3px solid var(--gold); grid-column: 1 / -1; background: linear-gradient(145deg, var(--surface2), #2a2a00); }
  .confidence-card.global .score { font-size: 80px; color: var(--gold-light); text-shadow: 0 0 30px rgba(255, 204, 0, 0.5); }

  table { width: 100%; border-collapse: collapse; margin-top: 40px; font-size: 16px; }
  th, td { padding: 20px; text-align: left; border-bottom: 2px solid var(--border); }
  th { color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">HallucinNet</div>
</nav>

<section style="padding-top: 140px;">
  <div class="section-eyebrow">BYOK Mode (Gemini Free Tier)</div>
  <h2 class="section-title">Deep Model Auditing</h2>
  
  <div class="api-config">
    <label style="color: var(--gold)">Google Gemini API Key (Required)</label>
    <input type="password" class="api-input" id="apiKey" placeholder="AIzaSy..." />
    <p style="font-size: 10px; color: var(--text-sub); margin-top: 8px;">
      Get your free key from <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: var(--gold)">Google AI Studio</a>. 
      Supports 15 requests per minute for free.
    </p>
  </div>

  <div class="detector-card">
    <div class="detector-input-area">
      <label>User Prompt</label>
      <textarea class="detector-textarea" id="userPrompt" placeholder="Question asked to the models..."></textarea>
      <div class="grid-2">
        <div><label>GPT-4o</label><textarea class="detector-textarea" id="gpt4o" placeholder="Paste response..."></textarea></div>
        <div><label>Gemini</label><textarea class="detector-textarea" id="gemini" placeholder="Paste response..."></textarea></div>
        <div><label>Claude</label><textarea class="detector-textarea" id="claude" placeholder="Paste response..."></textarea></div>
        <div><label>Llama</label><textarea class="detector-textarea" id="llama" placeholder="Paste response..."></textarea></div>
      </div>
      <button class="btn-primary" onclick="runAudit()">Run 7-Step Deep Audit →</button>
    </div>
    <div class="confidence-grid" id="confidenceGrid">
      <div class="confidence-card"><h4>GPT-4o</h4><div class="score" id="scoreGpt4o">--%</div></div>
      <div class="confidence-card"><h4>Gemini</h4><div class="score" id="scoreGemini">--%</div></div>
      <div class="confidence-card"><h4>Claude</h4><div class="score" id="scoreClaude">--%</div></div>
      <div class="confidence-card"><h4>Llama</h4><div class="score" id="scoreLlama">--%</div></div>
      <div class="confidence-card global"><h4>Global Confidence Score</h4><div class="score" id="scoreGlobal">--%</div></div>
    </div>
    <div class="report-display" id="reportDisplay"></div>
  </div>

  <div id="history">
    <div class="section-eyebrow">Audit Logs</div>
    <table id="historyTable">
      <thead>
        <tr><th>Date</th><th>Input</th><th>Score</th><th>Status</th></tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</section>

<script>
async function runAudit() {
  const apiKey = document.getElementById('apiKey').value;
  if (!apiKey) { alert('Please enter your Google Gemini API Key for real analysis.'); return; }

  const data = {
    apiKey: apiKey,
    userPrompt: document.getElementById('userPrompt').value,
    gpt4o: document.getElementById('gpt4o').value,
    gemini: document.getElementById('gemini').value,
    claude: document.getElementById('claude').value,
    llama: document.getElementById('llama').value
  };

  const reportEl = document.getElementById('reportDisplay');
  const gridEl = document.getElementById('confidenceGrid');
  reportEl.style.display = 'block';
  gridEl.style.display = 'none';
  reportEl.textContent = 'Contacting Gemini Analysis Engine (Step 1 of 7)...';

  try {
    const res = await fetch('/api/analyze-comparison', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    if (result.error) throw new Error(result.error);
    reportEl.textContent = result.report;

    // Parse scores from report
    const gptScore = result.report.match(/GPT-4o Confidence:\s*(\d+)%/i);
    const geminiScore = result.report.match(/Gemini Confidence:\s*(\d+)%/i);
    const claudeScore = result.report.match(/Claude Confidence:\s*(\d+)%/i);
    const llamaScore = result.report.match(/Llama Confidence:\s*(\d+)%/i);
    const globalScore = result.report.match(/GLOBAL CONFIDENCE:\s*(\d+)%/i);

    document.getElementById('scoreGpt4o').textContent = (gptScore ? gptScore[1] : '--') + '%';
    document.getElementById('scoreGemini').textContent = (geminiScore ? geminiScore[1] : '--') + '%';
    document.getElementById('scoreClaude').textContent = (claudeScore ? claudeScore[1] : '--') + '%';
    document.getElementById('scoreLlama').textContent = (llamaScore ? llamaScore[1] : '--') + '%';
    document.getElementById('scoreGlobal').textContent = (globalScore ? globalScore[1] : result.score) + '%';
    
    gridEl.style.display = 'grid';
    loadHistory();
  } catch (e) {
    reportEl.textContent = 'Audit Failed: ' + e.message;
  }
}

async function loadHistory() {
  const res = await fetch('/api/history');
  const data = await res.json();
  const tbody = document.getElementById('historyBody');
  tbody.innerHTML = '';
  data.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${new Date(r.created_at).toLocaleTimeString()}</td>
      <td>${r.input.substring(0, 50)}...</td>
      <td style="color: var(--gold)">${r.score}%</td>
      <td>Deep Audit (Gemini)</td>
    `;
    tbody.appendChild(tr);
  });
}

window.onload = loadHistory;
</script>
</body>
</html>
